name: On Semantic Release (build & publish image)

on:
  release:
    types: [released]

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      docker_tags: |
        type=raw,value=${{ github.event.release.tag_name }}
        type=raw,value=latest
    permissions:
      contents: read
      packages: write
