name: On PR (build & publish pre-release image)

on:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Run e2e tests
        run: npm run test:e2e

  build:
    needs: test
    uses: ./.github/workflows/_build.yml
    with:
      docker_tags: |
        type=raw,value=pr-${{ github.event.number }}
    permissions:
      contents: read
      packages: write

